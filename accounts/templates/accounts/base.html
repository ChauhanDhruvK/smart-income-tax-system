<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SmartTax - {% block title %}{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

        body {
            font-family: 'DM Sans', sans-serif;
        }
    </style>


</head>

<body class="bg-gray-50 text-gray-800">

    {% if user.is_authenticated %}

    <!-- NAVBAR -->

    <nav class="bg-white/90 backdrop-blur border-b border-gray-200 sticky top-0 z-50">

        <div class="max-w-7xl mx-auto px-6">

            <div class="flex items-center justify-between h-16">

                <!-- Logo -->
                <a href="{% url 'dashboard' %}" class="text-xl font-semibold text-blue-600 tracking-tight">
                    SmartTax
                </a>

                <!-- Navigation -->
                <div class="hidden md:flex items-center space-x-8 text-sm font-medium">

                    <a href="{% url 'dashboard' %}" class="text-gray-600 hover:text-blue-600 transition">
                        Dashboard
                    </a>

                    <a href="{% url 'add_income' %}" class="text-gray-600 hover:text-blue-600 transition">
                        Add Income
                    </a>

                    <a href="{% url 'add_deduction' %}" class="text-gray-600 hover:text-blue-600 transition">
                        Add Deduction
                    </a>

                    <a href="{% url 'calculate_tax' %}" class="text-gray-600 hover:text-blue-600 transition">
                        Calculate Tax
                    </a>

                    <a href="{% url 'explore_plans' %}" class="text-gray-600 hover:text-blue-600 transition">
                        Plans
                    </a>

                </div>

                <!-- Right Side -->
                <div class="flex items-center space-x-4">

                    <span class="hidden md:block text-sm text-gray-500">
                        {{ user.username }}
                    </span>

                    <a href="{% url 'logout' %}"
                        class="px-4 py-2 text-sm font-medium bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                        Logout
                    </a>

                </div>

            </div>

        </div>

    </nav>

    {% endif %}

    <!-- MAIN CONTENT -->

    <main class="max-w-7xl mx-auto px-6 py-8">

        <!-- Django Messages -->
        {% if messages %}
        {% for message in messages %}

        <div class="mb-4 p-4 rounded-lg text-sm
        {% if message.tags == 'success' %}
            bg-green-50 text-green-700 border border-green-200
        {% elif message.tags == 'error' %}
            bg-red-50 text-red-700 border border-red-200
        {% else %}
            bg-blue-50 text-blue-700 border border-blue-200
        {% endif %}
    ">
            {{ message }}
        </div>

        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}

    </main>

</body>

</html>
