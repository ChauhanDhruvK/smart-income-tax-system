<!DOCTYPE html>
<html>
<head>
    <title>{{ plan }} Plan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
        }

        .ai-box {
            white-space: pre-line;
            font-size: 15px;
        }

        .card {
            border-radius: 12px;
        }

        .title-icon {
            font-size: 22px;
            margin-right: 8px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4 shadow">
    <span class="navbar-brand fw-bold">{{ plan }} Investment Advisor</span>

    <a href="{% url 'explore_plans' %}" class="btn btn-outline-light btn-sm">
        ← Back
    </a>
</nav>

<div class="container py-4">

    <!-- Financial Summary -->
    <div class="card shadow-lg mb-4 border-0">
        <div class="card-body">

            <h4 class="mb-3">
                💰 Your Financial Details
            </h4>

            <div class="row">

                <div class="col-md-4">
                    <div class="p-3 bg-light rounded shadow-sm text-center">
                        <h6>Monthly Income</h6>
                        <h5 class="text-success">₹ {{ income }}</h5>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-3 bg-light rounded shadow-sm text-center">
                        <h6>Recommended %</h6>
                        <h5 class="text-primary">{{ percent }}%</h5>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-3 bg-light rounded shadow-sm text-center">
                        <h6>Investment Amount</h6>
                        <h5 class="text-danger">₹ {{ amount }}</h5>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- AI Recommendation -->
    <div class="card shadow-lg mb-4 border-0">
        <div class="card-body">

            <h4 class="text-primary mb-3">
                🤖 AI Recommendation
            </h4>

            <div class="alert alert-info ai-box">
                {{ ai_text|linebreaks }}
            </div>

        </div>
    </div>

    <!-- Suggested Apps -->
    <div class="card shadow-lg border-0">
        <div class="card-body">

            <h4 class="mb-3">
                📱 Suggested Apps & Platforms
            </h4>

            <div class="row">

                {% for app in apps %}
                <div class="col-md-4 mb-3">
                    <div class="card border-0 shadow-sm h-100 text-center p-3">

                        <div style="font-size:30px;">📊</div>

                        <h6 class="mt-2">{{ app }}</h6>

                    </div>
                </div>
                {% endfor %}

            </div>

        </div>
    </div>

</div>

</body>
</html>
