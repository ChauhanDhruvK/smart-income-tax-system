{% extends 'accounts/base.html' %}
{% block title %}Add Income{% endblock %}

{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .form-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text);
        font-weight: 500;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid #E5E7EB;
        border-radius: 8px;
        font-size: 1rem;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
    }

    .chip {
        padding: 0.5rem 1rem;
        background: #F3F4F6;
        border-radius: 20px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s;
    }

    .chip:hover {
        background: var(--primary);
        color: white;
    }
</style>

<div class="form-container">
    <div class="form-header">
        <h1>Add Income</h1>
        <p style="color: var(--text-light);">Record your income details</p>
    </div>

    <div class="suggestions">
        <span class="chip" onclick="document.getElementById('source').value='Salary'">Salary</span>
        <span class="chip" onclick="document.getElementById('source').value='Freelance'">Freelance</span>
        <span class="chip" onclick="document.getElementById('source').value='Business'">Business</span>
        <span class="chip" onclick="document.getElementById('source').value='Rental'">Rental</span>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Source</label>
            <input type="text" id="source" name="source" placeholder="e.g., Salary" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" name="amount" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" value="{% now 'Y-m-d' %}" required>
            </div>
        </div>

        <div class="form-group">
            <label>Description (Optional)</label>
            <textarea name="description" rows="3" placeholder="Add notes..."></textarea>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Save Income</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
